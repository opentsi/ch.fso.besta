details:
  en: |
    The series of JOBSTAT have been revised for the quarters from 2018-II to 2025-I (August 2025)
    Corrected values for the totals of Section C (NOGA 10-33) from the third quarter of 1991 to the first quarter of 2025.
  de: |
    Die BESTA-Ergebnisse wurden für die Quartale 2018-II bis 2025-I revidiert (August 2025)
    Korrigierte Werte für die Summen von Abschnitt C (NOGA 10-33) ab 3. Quartal 1991 bis 1. Quartal 2025.
  fr: |
    Les séries de la STATEM ont été révisées pour les trimestres 2018-II à 2025-I (août 2025)
    Valeurs corrigées pour les totaux de la section C (NOGA 10-33) du 3e trimestre 1991 au 1er trimestre 2025.
  it: |
    Le serie della STATIMP sono state revisionate per i trimestri dal 2018-II al 2025-I (Agosto 2025)
    Valori corretti per i totali della sezione C (NOGA 10-33) dal terzo trimestre 1991 al primo trimestre 2025.
